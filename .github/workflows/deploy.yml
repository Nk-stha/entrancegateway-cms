# ============================================================================
#  EntranceGateway CMS — CD Pipeline (Docker on VPS)
# ============================================================================
#
#  Required GitHub Secrets:
#    VPS_HOST          — Server IP or hostname
#    VPS_USER          — SSH user
#    VPS_PASSWORD      — SSH password
#    DEPLOY_PATH       — Project path on server (e.g. /opt/entrancegateway-cms)
#    ENV_PRODUCTION    — Contents of .env.production file
#    APP_PORT          — Host port (optional, defaults to 6030)
#
#  Prerequisites on VPS:
#    - Docker & Docker Compose installed
#    - Git installed
#    - Repo cloned at DEPLOY_PATH
#
# ============================================================================

name: 🚀 Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: 'Deployment action'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - rollback
          - restart
          - status

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  NODE_VERSION: '20'

jobs:
  # ─── Validate ───────────────────────────────────────────────────────────
  validate:
    name: 🔍 Validate Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
        continue-on-error: true
      - name: Build check
        run: |
          echo "API_BASE_URL=https://api.entrancegateway.com" > .env.production
          echo "NEXT_PUBLIC_API_URL=/api/proxy" >> .env.production
          npm run build

  # ─── Deploy ─────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to VPS
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy')
    environment:
      name: production

    steps:
      - name: 📋 Deployment info
        run: |
          echo "╔══════════════════════════════════════════════════╗"
          echo "║    EntranceGateway CMS — Docker CD Pipeline      ║"
          echo "╚══════════════════════════════════════════════════╝"
          echo "Branch : ${{ github.ref_name }}"
          echo "Commit : ${{ github.sha }}"
          echo "Actor  : ${{ github.actor }}"

      - name: 🔧 Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      - name: 🔗 Test SSH connection
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "echo '✓ Connected' && docker --version && docker compose version" || {
            echo "::error::SSH failed or Docker not installed on VPS."
            exit 1
          }

      - name: 📝 Write .env.production
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          echo '${{ secrets.ENV_PRODUCTION }}' | sshpass -e ssh \
            -o StrictHostKeyChecking=no \
            -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cat > ${{ secrets.DEPLOY_PATH }}/.env.production"

      - name: 🚀 Deploy
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 \
            -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
              cd ${{ secrets.DEPLOY_PATH }}
              export CI=true
              export APP_PORT=${{ secrets.APP_PORT || 6030 }}
              export GITHUB_SHA='${{ github.sha }}'
              export GITHUB_REF='${{ github.ref_name }}'
              export GITHUB_ACTOR='${{ github.actor }}'
              bash deploy.sh --ci 2>&1
          " || {
            echo "::error::Deployment failed!"
            # Fetch logs for debugging
            sshpass -e ssh -o StrictHostKeyChecking=no \
              -p ${{ secrets.VPS_PORT || 22 }} \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
              "tail -50 ${{ secrets.DEPLOY_PATH }}/deploy.log 2>/dev/null; \
               echo '--- Container logs ---'; \
               cd ${{ secrets.DEPLOY_PATH }} && docker compose logs --tail=30 2>/dev/null" || true
            exit 1
          }

      - name: 📊 Post-deploy status
        if: success()
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no \
            -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH }} && bash deploy.sh --status" || true

      - name: 📢 Summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "## ✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Actor** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

  # ─── Rollback ───────────────────────────────────────────────────────────
  rollback:
    name: ⏪ Rollback
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'rollback'
    steps:
      - name: 🔧 Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass
      - name: ⏪ Rollback
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no \
            -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
              cd ${{ secrets.DEPLOY_PATH }}
              export CI=true
              export APP_PORT=${{ secrets.APP_PORT || 6030 }}
              bash deploy.sh --ci-rollback 2>&1
          "

  # ─── Restart ────────────────────────────────────────────────────────────
  restart:
    name: 🔄 Restart
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'restart'
    steps:
      - name: 🔧 Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass
      - name: 🔄 Restart
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no \
            -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
              cd ${{ secrets.DEPLOY_PATH }}
              export APP_PORT=${{ secrets.APP_PORT || 6030 }}
              docker compose restart
          "

  # ─── Status ─────────────────────────────────────────────────────────────
  status:
    name: 📊 Status
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'status'
    steps:
      - name: 🔧 Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass
      - name: 📊 Status
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no \
            -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH }} && bash deploy.sh --status"
