# ============================================================================
#  EntranceGateway CMS — Continuous Deployment to VPS
# ============================================================================
#
#  Triggers:
#    - Push to 'main' branch
#    - Manual dispatch from GitHub Actions UI
#
#  Required GitHub Secrets:
#    VPS_HOST          — Server IP or hostname (e.g. 103.45.67.89)
#    VPS_USER          — SSH user (e.g. deploy, ubuntu, root)
#    VPS_PASSWORD      — SSH password for the user
#    VPS_PORT          — SSH port (optional, defaults to 22)
#    DEPLOY_PATH       — Absolute path on server (e.g. /var/www/entrancegateway-cms)
#    ENV_PRODUCTION    — Contents of .env.production file
#    APP_PORT          — Application port (optional, defaults to 3000)
#    PM2_INSTANCES     — PM2 cluster instances (optional, defaults to 2)
#
#  First-time server setup:
#    1. SSH into your VPS
#    2. Install Node.js >= 18, PM2, Git
#    3. Clone the repo to DEPLOY_PATH
#    4. Run: ./deploy.sh --setup
#    5. Configure the GitHub Secrets listed above
#    6. Push to main — the pipeline handles the rest
#
# ============================================================================

name: 🚀 Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: 'Deployment action'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - rollback
          - restart
          - status

# Prevent concurrent deployments
concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  NODE_VERSION: '20'

jobs:
  # ─── Lint & Build Check ─────────────────────────────────────────────────
  validate:
    name: 🔍 Validate Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint check
        run: npm run lint
        continue-on-error: true

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build check
        run: |
          echo "API_BASE_URL=https://api.entrancegateway.com" > .env.production
          echo "NEXT_PUBLIC_API_URL=/api/proxy" >> .env.production
          npm run build

  # ─── Deploy to VPS ──────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to VPS
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy')
    environment:
      name: production
      url: https://cms.entrancegateway.com

    steps:
      - name: 📋 Deployment info
        run: |
          echo "╔══════════════════════════════════════════════════╗"
          echo "║    EntranceGateway CMS — CD Pipeline             ║"
          echo "╚══════════════════════════════════════════════════╝"
          echo ""
          echo "Trigger  : ${{ github.event_name }}"
          echo "Branch   : ${{ github.ref_name }}"
          echo "Commit   : ${{ github.sha }}"
          echo "Actor    : ${{ github.actor }}"
          echo "Run      : ${{ github.run_number }}"

      - name: 🔧 Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: 🔗 Test SSH connection
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "echo '✓ SSH connection successful' && hostname && uptime" || {
            echo "::error::SSH connection failed. Check VPS_HOST, VPS_USER, VPS_PASSWORD, and VPS_PORT secrets."
            exit 1
          }

      - name: 📂 Verify deploy path
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no \
            -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "test -d ${{ secrets.DEPLOY_PATH }} && test -f ${{ secrets.DEPLOY_PATH }}/deploy.sh" || {
            echo "::error::Deploy path '${{ secrets.DEPLOY_PATH }}' not found or deploy.sh missing."
            echo "::error::SSH into your server and run: cd ${{ secrets.DEPLOY_PATH }} && ./deploy.sh --setup"
            exit 1
          }

      - name: 📝 Write .env.production
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          echo '${{ secrets.ENV_PRODUCTION }}' | sshpass -e ssh \
            -o StrictHostKeyChecking=no \
            -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cat > ${{ secrets.DEPLOY_PATH }}/.env.production"
          echo "✓ Environment file written"

      - name: 🚀 Run deployment
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 \
            -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
              cd ${{ secrets.DEPLOY_PATH }}

              export CI=true
              export PORT=${{ secrets.APP_PORT || 3000 }}
              export PM2_INSTANCES=${{ secrets.PM2_INSTANCES || 2 }}
              export GITHUB_SHA='${{ github.sha }}'
              export GITHUB_REF='${{ github.ref_name }}'
              export GITHUB_RUN='${{ github.run_number }}'
              export GITHUB_ACTOR='${{ github.actor }}'

              bash deploy.sh --ci 2>&1
          " || {
            echo ""
            echo "::error::Deployment failed! Fetching error logs..."

            # Grab deploy.log for debugging
            sshpass -e ssh -o StrictHostKeyChecking=no \
              -p ${{ secrets.VPS_PORT || 22 }} \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
              "echo '--- deploy.log (last 50 lines) ---' && tail -50 ${{ secrets.DEPLOY_PATH }}/deploy.log 2>/dev/null; \
               echo ''; echo '--- PM2 error logs ---' && pm2 logs entrancegateway-cms --lines 30 --nostream 2>/dev/null" || true

            exit 1
          }

      - name: 📊 Post-deploy verification
        if: success()
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no \
            -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH }} && bash deploy.sh --status" || true

      - name: 📢 Deployment summary
        if: success()
        run: |
          echo "## ✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Actor** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Run** | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Server** | \`${{ secrets.VPS_HOST }}\` |" >> $GITHUB_STEP_SUMMARY

      - name: ❌ Deployment failure summary
        if: failure()
        run: |
          echo "## ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Actor** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the deploy logs above for details." >> $GITHUB_STEP_SUMMARY
          echo "To rollback: run the workflow manually with action = \`rollback\`" >> $GITHUB_STEP_SUMMARY

  # ─── Rollback ───────────────────────────────────────────────────────────
  rollback:
    name: ⏪ Rollback
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'rollback'

    steps:
      - name: 🔧 Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: ⏪ Execute rollback
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no \
            -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
              cd ${{ secrets.DEPLOY_PATH }}
              export CI=true
              bash deploy.sh --ci-rollback 2>&1
          " || {
            echo "::error::Rollback failed!"
            exit 1
          }

      - name: Rollback summary
        if: success()
        run: |
          echo "## ⏪ Rollback Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Rolled back to the previous build on \`${{ secrets.VPS_HOST }}\`." >> $GITHUB_STEP_SUMMARY

  # ─── Restart ────────────────────────────────────────────────────────────
  restart:
    name: 🔄 Restart
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'restart'

    steps:
      - name: 🔧 Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: 🔄 Restart application
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no \
            -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
              cd ${{ secrets.DEPLOY_PATH }}
              export CI=true
              bash deploy.sh --restart-only 2>&1
          "

  # ─── Status ─────────────────────────────────────────────────────────────
  status:
    name: 📊 Status Check
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'status'

    steps:
      - name: 🔧 Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: 📊 Get status
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no \
            -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH }} && bash deploy.sh --status"
